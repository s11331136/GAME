<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲開發平台</title>
    <style>
        :root { 
            --sidebar-width: 260px; 
            --dark-bg: #1e1f20; 
            --item-hover: #333537; 
            --accent: #8ab4f8; 
            --light-text: #e3e3e3; 
        }
        body { font-family: '微軟正黑體', sans-serif; margin: 0; display: flex; height: 100vh; background: #131314; color: var(--light-text); overflow: hidden; }

        /* --- 側邊選單 --- */
        #sidebar { width: var(--sidebar-width); background: var(--dark-bg); transition: 0.3s; border-right: 1px solid #444; z-index: 100; flex-shrink: 0; overflow-y: auto; }
        #sidebar.collapsed { width: 0; border: none; visibility: hidden; opacity: 0; }
        .sidebar-content { padding: 20px; width: var(--sidebar-width); box-sizing: border-box; }
        .menu-category { font-size: 0.8rem; color: #9aa0a6; margin: 20px 0 10px 10px; text-transform: uppercase; white-space: nowrap; }
        .menu-item { padding: 12px 15px; margin: 4px 0; border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; white-space: nowrap; }
        .menu-item:hover { background: var(--item-hover); }
        .menu-item.active { background: #394457; color: var(--accent); }

        /* --- 主內容 --- */
        #main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        #header { background: #131314; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        #menu-toggle { background: none; border: none; color: white; font-size: 24px; cursor: pointer; border-radius: 50%; width: 45px; height: 45px; }
        #menu-toggle:hover { background: var(--item-hover); }
        .score-box { display: flex; gap: 10px; }
        .score-item { font-size: 0.9rem; background: #282a2d; padding: 8px 15px; border-radius: 10px; border: 1px solid #444; min-width: 80px; text-align: center; }

        /* --- 遊戲顯示區域 --- */
        #game-display { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; overflow: auto; }
        
        canvas { border: 5px solid #333; background-color: #000; border-radius: 5px; max-width: 100%; height: auto; }

        /* 2048 特殊樣式 */
        #game-2048 { display: none; background: #bbada0; width: 320px; height: 320px; padding: 10px; border-radius: 6px; position: relative; }
        #grid-base { position: relative; width: 100%; height: 100%; }
        .cell { width: 70px; height: 70px; background: rgba(238, 228, 218, 0.35); border-radius: 3px; position: absolute; }
        .tile { width: 70px; height: 70px; border-radius: 3px; position: absolute; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: bold; color: #776e65; transition: all 0.12s ease; z-index: 10; }

        /* 一筆畫地牢樣式 */
        #game-dungeon { display: none; flex-direction: column; align-items: center; }
        #dungeon-board { display: grid; grid-template-columns: repeat(5, 60px); gap: 8px; background: #282a2d; padding: 15px; border-radius: 12px; }
        .dg-cell { width: 60px; height: 60px; background: #3c4043; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; cursor: pointer; transition: 0.2s; }
        .dg-cell.visited { background: #394457; border: 2px solid var(--accent); }
        .dg-cell.current { background: var(--accent); transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }

        /* 其他遊戲容器 */
        #game-snake, #game-magnet, #game-defense, #game-breakout, #game-laser { display: none; flex-direction: column; align-items: center; }

        /* 彈窗 */
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #2c2c2c; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--accent); }
        .modal-btn { background: var(--accent); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; margin: 10px; }

        /* 2048 顏色 */
        .n2 { background: #eee4da; } .n4 { background: #ede0c8; } .n8 { background: #f2b179; color: white; }
        .n16 { background: #f59563; color: white; } .n32 { background: #f67c5f; color: white; } .n64 { background: #f65e3b; color: white; }
        .n128 { background: #edcf72; color: white; } .n1024 { background: #edc53f; color: white; font-size: 20px; }
    </style>
</head>
<body>

<div id="custom-modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-msg"></p>
        <div id="modal-actions"></div>
    </div>
</div>

<nav id="sidebar">
    <div class="sidebar-content">
        <h2 style="color: var(--accent);">遊戲倉庫</h2>
        <div class="menu-category">益智系列</div>
        <div class="menu-item" id="btn-2048" onclick="switchGame('2048')"><span>🎮</span> 2048</div>
        <div class="menu-item" id="btn-snake" onclick="switchGame('snake')"><span>🐍</span> 貪食蛇</div>
        <div class="menu-item" id="btn-dungeon" onclick="switchGame('dungeon')"><span>🗝️</span> 一筆畫地牢</div>
        <div class="menu-item" id="btn-laser" onclick="switchGame('laser')"><span>⚡</span> 雷射導引</div>
        <div class="menu-category">動作系列</div>
        <div class="menu-item" id="btn-breakout" onclick="switchGame('breakout')"><span>🎾</span> 極簡打磚塊</div>
        <div class="menu-item" id="btn-magnet" onclick="switchGame('magnet')"><span>🧲</span> 極地磁鐵</div>
        <div class="menu-item" id="btn-defense" onclick="switchGame('defense')"><span>🛡️</span> 色塊防線</div>
    </div>
</nav>

<div id="main">
    <header id="header">
        <div class="nav-left">
            <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div id="current-title" style="font-size: 1.2rem; font-weight: bold;">首頁</div>
        </div>
        <div class="score-box">
            <div class="score-item">分數: <span id="score">0</span></div>
            <div class="score-item" style="color: var(--accent);">最高: <span id="best">0</span></div>
        </div>
    </header>

    <div id="game-display">
        <h3 id="welcome-msg">← 選擇一款遊戲開始挑戰！</h3>
        <div id="game-2048"><div id="grid-base"></div></div>
        <div id="game-snake"><canvas id="snakeCanvas" width="400" height="400"></canvas></div>
        <div id="game-magnet"><canvas id="magnetCanvas" width="400" height="500"></canvas></div>
        <div id="game-defense"><canvas id="defenseCanvas" width="400" height="400"></canvas></div>
        <div id="game-dungeon">
            <div id="dungeon-board"></div>
            <p>生命值: <span id="dg-hp">100</span> | <button onclick="initDungeon()">重置</button></p>
        </div>
        <div id="game-breakout"><canvas id="breakoutCanvas" width="400" height="500"></canvas></div>
        <div id="game-laser"><canvas id="laserCanvas" width="400" height="400"></canvas></div>
    </div>
</div>

<script>
    let currentGame = "", gameActive = false, mainLoop;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    function switchGame(game) {
        document.getElementById('welcome-msg').style.display = 'none';
        ['game-2048','game-snake','game-magnet','game-defense','game-dungeon','game-breakout','game-laser'].forEach(id => document.getElementById(id).style.display = 'none');
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + game).classList.add('active');
        
        cancelAnimationFrame(mainLoop);
        if(window.snakeInterval) clearInterval(window.snakeInterval);
        closeModal();
        
        currentGame = game;
        document.getElementById('current-title').innerText = document.getElementById('btn-'+game).innerText.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '');
        
        const gameDiv = document.getElementById('game-' + game);
        gameDiv.style.display = 'flex';
        if(game === '2048') { gameDiv.style.display = 'block'; init2048(); }
        else if(game === 'snake') initSnake();
        else if(game === 'magnet') initMagnet();
        else if(game === 'defense') initDefense();
        else if(game === 'dungeon') initDungeon();
        else if(game === 'breakout') initBreakout();
        else if(game === 'laser') initLaser();
    }

    function openModal(title, msg) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        document.getElementById('modal-actions').innerHTML = `<button class="modal-btn" onclick="restartCurrentGame()">再次挑戰</button>`;
        document.getElementById('custom-modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
    function restartCurrentGame() { closeModal(); switchGame(currentGame); }

    // --- 2048 ---
    let b2048;
    function init2048() {
        b2048 = Array(16).fill(0);
        document.getElementById('grid-base').innerHTML = Array(16).fill('<div class="cell"></div>').join('');
        const cells = document.querySelectorAll('.cell');
        cells.forEach((c, i) => { c.style.left = (i%4)*78+'px'; c.style.top = Math.floor(i/4)*78+'px'; });
        spawn2048(); spawn2048(); gameActive = true;
    }
    function spawn2048() {
        let empty = b2048.map((v,i) => v===0?i:null).filter(v=>v!==null);
        if(empty.length) b2048[empty[Math.floor(Math.random()*empty.length)]] = 2;
        render2048();
    }
    function render2048() {
        const grid = document.getElementById('grid-base');
        grid.querySelectorAll('.tile').forEach(t => t.remove());
        b2048.forEach((v, i) => {
            if(v > 0) {
                let t = document.createElement('div'); t.className = `tile n${v}`; t.innerText = v;
                t.style.left = (i%4)*78+'px'; t.style.top = Math.floor(i/4)*78+'px';
                grid.appendChild(t);
            }
        });
    }

    // --- 貪食蛇 ---
    let snake, food, dx, dy;
    function initSnake() {
        snake = [{x:200, y:200}]; dx = 20; dy = 0; createFood();
        window.snakeInterval = setInterval(drawSnake, 150);
    }
    function createFood() { food = {x: Math.floor(Math.random()*19)*20, y: Math.floor(Math.random()*19)*20}; }
    function drawSnake() {
        const canvas = document.getElementById('snakeCanvas'), ctx = canvas.getContext('2d');
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        if(head.x<0||head.x>=400||head.y<0||head.y>=400||snake.some(s=>s.x===head.x&&s.y===head.y)) {
            clearInterval(window.snakeInterval); openModal("遊戲結束", "蛇撞到了！"); return;
        }
        snake.unshift(head);
        if(head.x===food.x && head.y===food.y) createFood(); else snake.pop();
        ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
        ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, 18, 18);
        ctx.fillStyle = "#8ab4f8"; snake.forEach(s => ctx.fillRect(s.x, s.y, 18, 18));
    }

    // --- 極簡打磚塊 ---
    let bBall, bPaddle, bBricks, bParts;
    function initBreakout() {
        bBall = {x:200, y:400, dx:3, dy:-3, r:7}; bPaddle = {x:160, w:80}; bBricks = []; bParts = [];
        for(let r=0; r<3; r++) for(let c=0; c<6; c++) bBricks.push({x:c*65+10, y:r*25+50, w:55, h:15, active:true});
        gameActive = true; breakoutLoop();
    }
    function breakoutLoop() {
        if(currentGame !== 'breakout') return;
        const ctx = document.getElementById('breakoutCanvas').getContext('2d');
        ctx.fillStyle = "black"; ctx.fillRect(0,0,400,500);
        bBall.x += bBall.dx; bBall.y += bBall.dy;
        if(bBall.x<0 || bBall.x>400) bBall.dx *= -1;
        if(bBall.y<0) bBall.dy *= -1;
        if(bBall.y>480 && bBall.x>bPaddle.x && bBall.x<bPaddle.x+bPaddle.w) bBall.dy = -Math.abs(bBall.dy);
        if(bBall.y>500) { openModal("失敗", "球掉了！"); return; }
        bBricks.forEach(b => {
            if(b.active && bBall.x>b.x && bBall.x<b.x+b.w && bBall.y>b.y && bBall.y<b.y+b.h) {
                b.active = false; bBall.dy *= -1;
                for(let i=0;i<5;i++) bParts.push({x:b.x+25, y:b.y, dx:(Math.random()-0.5)*4, dy:(Math.random()-0.5)*4, l:20});
            }
            if(b.active) { ctx.fillStyle = "#8ab4f8"; ctx.fillRect(b.x, b.y, b.w, b.h); }
        });
        bParts.forEach((p,i) => { p.x+=p.dx; p.y+=p.dy; p.l--; if(p.l<=0) bParts.splice(i,1); ctx.fillStyle="white"; ctx.fillRect(p.x,p.y,2,2); });
        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(bBall.x, bBall.y, bBall.r, 0, 7); ctx.fill();
        ctx.fillStyle="#8ab4f8"; ctx.fillRect(bPaddle.x, 485, bPaddle.w, 10);
        mainLoop = requestAnimationFrame(breakoutLoop);
    }

    // --- 雷射導引 ---
    let lMirrors;
    function initLaser() {
        lMirrors = Array(25).fill(0); gameActive = true; drawLaser();
        document.getElementById('laserCanvas').onclick = (e) => {
            const rect = e.target.getBoundingClientRect();
            const x = Math.floor((e.clientX-rect.left)/80), y = Math.floor((e.clientY-rect.top)/80);
            lMirrors[y*5+x] = (lMirrors[y*5+x]+1)%3; drawLaser();
        };
    }
    function drawLaser() {
        const ctx = document.getElementById('laserCanvas').getContext('2d');
        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,400,400);
        ctx.strokeStyle = "#333"; for(let i=0;i<5;i++) for(let j=0;j<5;j++) ctx.strokeRect(i*80,j*80,80,80);
        lMirrors.forEach((m, i) => {
            if(!m) return;
            ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.beginPath();
            const x = (i%5)*80, y = Math.floor(i/5)*80;
            if(m===1) { ctx.moveTo(x+10, y+10); ctx.lineTo(x+70, y+70); }
            else { ctx.moveTo(x+70, y+10); ctx.lineTo(x+10, y+70); }
            ctx.stroke();
        });
        ctx.strokeStyle = "#ff5252"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 40);
        let cx = 0, cy = 40, cdx = 1, cdy = 0;
        for(let s=0; s<10; s++) {
            cx += cdx*400; cy += cdy*400; // 簡化射線
            ctx.lineTo(Math.min(400, Math.max(0, cx)), Math.min(400, Math.max(0, cy)));
        }
        ctx.stroke();
    }

    // --- 其他遊戲邏輯 (地牢, 磁鐵, 防線) ---
    function initDungeon() {
        const board = document.getElementById('dungeon-board'); board.innerHTML = '';
        for(let i=0; i<25; i++) {
            const d = document.createElement('div'); d.className = 'dg-cell';
            d.onclick = () => { d.classList.toggle('visited'); };
            board.appendChild(d);
        }
    }
    
    function initMagnet() {
        const ctx = document.getElementById('magnetCanvas').getContext('2d');
        let my = 250, md = 1; 
        function loop() {
            if(currentGame!=='magnet') return;
            ctx.fillStyle = "black"; ctx.fillRect(0,0,400,500);
            my += 3 * md; if(my<0 || my>500) md *= -1;
            ctx.fillStyle = "cyan"; ctx.beginPath(); ctx.arc(50, my, 15, 0, 7); ctx.fill();
            mainLoop = requestAnimationFrame(loop);
        } loop();
    }

    function initDefense() {
        let rot = 0;
        function loop() {
            if(currentGame!=='defense') return;
            const ctx = document.getElementById('defenseCanvas').getContext('2d');
            ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
            ctx.save(); ctx.translate(200,200); ctx.rotate(rot*Math.PI/180);
            ctx.strokeStyle = "red"; ctx.lineWidth = 10; ctx.strokeRect(-50,-50,100,100);
            ctx.restore(); rot += 2;
            mainLoop = requestAnimationFrame(loop);
        } loop();
    }

    // --- 事件監聽 ---
    window.addEventListener('keydown', e => {
        if(currentGame === 'snake') {
            if(e.key==='ArrowUp' && dy===0) {dx=0; dy=-20;}
            if(e.key==='ArrowDown' && dy===0) {dx=0; dy=20;}
            if(e.key==='ArrowLeft' && dx===0) {dx=-20; dy=0;}
            if(e.key==='ArrowRight' && dx===0) {dx=20; dy=0;}
        }
    });
    window.addEventListener('mousemove', e => {
        if(currentGame === 'breakout') {
            const rect = document.getElementById('breakoutCanvas').getBoundingClientRect();
            bPaddle.x = e.clientX - rect.left - 40;
        }
    });
</script>
</body>
</html>
