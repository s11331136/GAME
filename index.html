<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲開發平台 - 模組化版本</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="custom-modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-msg"></p>
        <div id="modal-actions"></div>
    </div>
</div>

<nav id="sidebar">
    <div class="sidebar-content">
        <h2 style="color: var(--accent);">遊戲倉庫</h2>
        <div class="menu-category">益智系列</div>
        <div class="menu-item" id="btn-2048" onclick="switchGame('2048')"><span>🎮</span> 2048</div>
        <div class="menu-item" id="btn-snake" onclick="switchGame('snake')"><span>🐍</span> 貪食蛇</div>
        <div class="menu-category">動作系列</div>
        <div class="menu-item" id="btn-magnet" onclick="switchGame('magnet')"><span>🧲</span> 極地磁鐵</div>
        <div class="menu-category">設定</div>
        <div class="menu-item" onclick="localStorage.clear(); location.reload();"><span>🗑️</span> 清除紀錄</div>
    </div>
</nav>

<div id="main">
    <header id="header">
        <div class="nav-left">
            <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div id="current-title" style="font-size: 1.2rem; font-weight: bold;">首頁</div>
        </div>
        <div class="score-box">
            <div class="score-item">分數: <span id="score">0</span></div>
            <div class="score-item" style="color: var(--accent);">最高: <span id="best">0</span></div>
        </div>
    </header>

    <div id="game-display">
        <h3 id="welcome-msg">← 點擊選單開始遊戲</h3>
        
        <div id="game-2048"><div id="grid-base"></div></div>
        
        <div id="game-snake">
            <canvas id="snakeCanvas" width="400" height="400"></canvas>
        </div>
        
        <div id="game-magnet">
            <canvas id="magnetCanvas" width="400" height="500"></canvas>
            <p style="color: #888; margin-top: 15px;">點擊畫布或按空白鍵切換重力</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
