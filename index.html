<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲開發平台</title>
    <style>
        :root { --sidebar-width: 260px; --dark-bg: #1e1f20; --item-hover: #333537; --accent: #8ab4f8; --light-text: #e3e3e3; }
        body { font-family: '微軟正黑體', sans-serif; margin: 0; display: flex; height: 100vh; background: #131314; color: var(--light-text); overflow: hidden; }

        /* --- 側邊選單修正 --- */
        #sidebar { 
            width: var(--sidebar-width); background: var(--dark-bg); transition: 0.3s; 
            border-right: 1px solid #444; z-index: 100; flex-shrink: 0;
            overflow: hidden; /* 防止收合時內容溢出 */
        }
        #sidebar.collapsed { 
            width: 0; border: none; 
            visibility: hidden; /* 關鍵：讓收合後的選單內容徹底不可見 */
            opacity: 0;
        }
        .sidebar-content { padding: 20px; width: var(--sidebar-width); box-sizing: border-box; }
        .menu-category { font-size: 0.8rem; color: #9aa0a6; margin: 20px 0 10px 10px; text-transform: uppercase; white-space: nowrap; }
        .menu-item { padding: 12px 15px; margin: 4px 0; border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; white-space: nowrap; }
        .menu-item:hover { background: var(--item-hover); }
        .menu-item.active { background: #394457; color: var(--accent); }

        /* --- 主內容與導覽列 --- */
        #main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        #header { background: #131314; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        #menu-toggle { background: none; border: none; color: white; font-size: 24px; cursor: pointer; border-radius: 50%; width: 45px; height: 45px; flex-shrink: 0; }
        #menu-toggle:hover { background: var(--item-hover); }
        .score-box { display: flex; gap: 10px; }
        .score-item { font-size: 0.9rem; background: #282a2d; padding: 8px 15px; border-radius: 10px; border: 1px solid #444; }

        /* --- 遊戲顯示區域 (修正置中) --- */
        #game-display { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            position: relative;
        }
        
        /* 2048 容器 (修正寬高與置中) */
        #game-2048 { 
            display: none; background: #bbada0; 
            width: 320px; height: 320px; 
            padding: 10px; border-radius: 6px; 
            position: relative; /* 作為內層絕對定位的基準 */
            margin: auto; /* 確保在 flex 容器中置中 */
        }
        .cell { width: 70px; height: 70px; background: rgba(238, 228, 218, 0.35); border-radius: 3px; position: absolute; }
        .tile { 
            width: 70px; height: 70px; border-radius: 3px; position: absolute; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 28px; font-weight: bold; color: #776e65;
            transition: all 0.12s ease-in-out; z-index: 10;
        }

        /* 貪食蛇 (保持置中) */
        #game-snake { display: none; flex-direction: column; align-items: center; justify-content: center; }
        canvas { border: 5px solid #333; background-color: #000; border-radius: 5px; max-width: 100%; height: auto; }

        /* 彈窗樣式 */
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #2c2c2c; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--accent); }
        .modal-btn { background: var(--accent); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* 2048 色彩 */
        .n2 { background: #eee4da; } .n4 { background: #ede0c8; } .n8 { background: #f2b179; color: white; }
        .n16 { background: #f59563; color: white; } .n32 { background: #f67c5f; color: white; } .n64 { background: #f65e3b; color: white; }
    </style>
</head>
<body>

<div id="custom-modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-msg"></p>
        <button class="modal-btn" onclick="closeModal()">再次挑戰</button>
    </div>
</div>

<nav id="sidebar">
    <div class="sidebar-content">
        <h2 style="color: var(--accent);">遊戲倉庫</h2>
        <div class="menu-category">益智系列</div>
        <div class="menu-item" id="btn-2048" onclick="switchGame('2048')"><span>🎮</span> 2048</div>
        <div class="menu-item" id="btn-snake" onclick="switchGame('snake')"><span>🐍</span> 貪食蛇</div>
        <div class="menu-category">設定</div>
        <div class="menu-item" onclick="localStorage.clear(); location.reload();"><span>🗑️</span> 清除紀錄</div>
    </div>
</nav>

<div id="main">
    <header id="header">
        <div class="nav-left">
            <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div id="current-title" style="font-size: 1.2rem; font-weight: bold;">首頁</div>
        </div>
        <div class="score-box">
            <div class="score-item">分數: <span id="score">0</span></div>
            <div class="score-item" style="color: var(--accent);">最高: <span id="best">0</span></div>
        </div>
    </header>

    <div id="game-display">
        <h3 id="welcome-msg">← 點擊選單開始遊戲</h3>
        <div id="game-2048"><div id="grid-base"></div></div>
        <div id="game-snake">
            <canvas id="snakeCanvas" width="400" height="400"></canvas>
            <p style="color: #888; margin-top: 15px;">使用 WASD 或 方向鍵控制</p>
        </div>
    </div>
</div>

<script>
    let currentGame = "", gameActive = false;

    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function switchGame(game) {
        document.getElementById('welcome-msg').style.display = 'none';
        document.getElementById('game-2048').style.display = 'none';
        document.getElementById('game-snake').style.display = 'none';
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + game).classList.add('active');
        if(window.snakeInterval) clearInterval(window.snakeInterval);

        if(game === '2048') {
            currentGame = "2048"; document.getElementById('current-title').innerText = "2048";
            document.getElementById('game-2048').style.display = 'block'; init2048();
        } else {
            currentGame = "snake"; document.getElementById('current-title').innerText = "貪食蛇";
            document.getElementById('game-snake').style.display = 'flex'; initSnake();
        }
    }

    function openModal(title, msg) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        document.getElementById('custom-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('custom-modal').style.display = 'none';
        if(currentGame === '2048') init2048();
        else if(currentGame === 'snake') initSnake();
    }

    // --- 2048 邏輯 ---
    let b2048 = [], s2048 = 0;
    function init2048() {
        b2048 = Array(16).fill(0); s2048 = 0; gameActive = true;
        document.getElementById('best').innerText = localStorage.getItem('2048_best') || 0;
        const grid = document.getElementById('grid-base'); grid.innerHTML = '';
        for (let i = 0; i < 16; i++) {
            let c = document.createElement('div'); c.className = 'cell';
            c.style.left = (i % 4) * 78 + 5 + 'px'; c.style.top = Math.floor(i / 4) * 78 + 5 + 'px';
            grid.appendChild(c);
        }
        spawn2048(); spawn2048();
    }
    function spawn2048() {
        let empty = b2048.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
        if(empty.length) b2048[empty[Math.floor(Math.random() * empty.length)]] = 2;
        render2048();
    }
    function render2048() {
        const grid = document.getElementById('grid-base');
        grid.querySelectorAll('.tile').forEach(t => t.remove());
        b2048.forEach((val, i) => {
            if(val > 0) {
                let t = document.createElement('div');
                t.className = `tile n${val > 64 ? 64 : val}`;
                t.innerText = val;
                t.style.left = (i % 4) * 78 + 5 + 'px'; t.style.top = Math.floor(i / 4) * 78 + 5 + 'px';
                grid.appendChild(t);
            }
        });
        document.getElementById('score').innerText = s2048;
        let best = localStorage.getItem('2048_best') || 0;
        if(s2048 > parseInt(best)) { localStorage.setItem('2048_best', s2048); document.getElementById('best').innerText = s2048; }
        check2048GameOver();
    }
    function move2048(dir) {
        if(!gameActive) return;
        let old = [...b2048];
        for (let i = 0; i < 4; i++) {
            let row = [], indices = [];
            for (let j = 0; j < 4; j++) {
                let idx = (dir==='left')? i*4+j : (dir==='right')? i*4+(3-j) : (dir==='up')? j*4+i : (3-j)*4+i;
                indices.push(idx); row.push(b2048[idx]);
            }
            let newRow = slideRow(row);
            indices.forEach((idx, j) => b2048[idx] = newRow[j]);
        }
        if (JSON.stringify(old) !== JSON.stringify(b2048)) { spawn2048(); }
    }
    function slideRow(row) {
        let arr = row.filter(v => v !== 0);
        for (let i = 0; i < arr.length - 1; i++) {
            if (arr[i] === arr[i+1]) { arr[i] *= 2; s2048 += arr[i]; arr.splice(i+1, 1); }
        }
        while (arr.length < 4) arr.push(0); return arr;
    }
    function check2048GameOver() {
        if (b2048.includes(0)) return;
        for (let i = 0; i < 16; i++) {
            if (i % 4 < 3 && b2048[i] === b2048[i+1]) return;
            if (i < 12 && b2048[i] === b2048[i+4]) return;
        }
        gameActive = false; openModal("2048 結束", "您的得分：" + s2048);
    }

    // --- 貪食蛇 ---
    let canvas, ctx, snake, food, dx, dy, sSnake;
    function initSnake() {
        canvas = document.getElementById('snakeCanvas'); ctx = canvas.getContext('2d');
        snake = [{x: 200, y: 200}, {x: 190, y: 200}]; dx = 10; dy = 0; sSnake = 0;
        document.getElementById('best').innerText = localStorage.getItem('snake_best') || 0;
        document.getElementById('score').innerText = 0; createFood();
        window.snakeInterval = setInterval(drawSnake, 100);
    }
    function drawSnake() {
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || snake.some(p => p.x === head.x && p.y === head.y)) {
            clearInterval(window.snakeInterval); openModal("遊戲結束", "您的得分：" + sSnake); return;
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            sSnake += 1; document.getElementById('score').innerText = sSnake;
            let best = localStorage.getItem('snake_best') || 0;
            if(sSnake > parseInt(best)) { localStorage.setItem('snake_best', sSnake); document.getElementById('best').innerText = sSnake; }
            createFood();
        } else { snake.pop(); }
        ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
        ctx.fillStyle = "#ff5252"; ctx.fillRect(food.x, food.y, 10, 10);
        ctx.fillStyle = "#8ab4f8"; snake.forEach(p => ctx.fillRect(p.x, p.y, 10, 10));
    }
    function createFood() { food = { x: Math.floor(Math.random()*39)*10, y: Math.floor(Math.random()*39)*10 }; }

    window.addEventListener('keydown', e => {
        const m = {'ArrowLeft':'left','KeyA':'left','ArrowRight':'right','KeyD':'right','ArrowUp':'up','KeyW':'up','ArrowDown':'down','KeyS':'down'};
        if(m[e.code]) {
            e.preventDefault();
            if(currentGame === "2048") move2048(m[e.code]);
            else if(currentGame === "snake") {
                const k = m[e.code];
                if(k==='up' && dy===0){dx=0;dy=-10;}
                else if(k==='down' && dy===0){dx=0;dy=10;}
                else if(k==='left' && dx===0){dx=-10;dy=0;}
                else if(k==='right' && dx===0){dx=10;dy=0;}
            }
        }
    });
</script>
</body>
</html>
