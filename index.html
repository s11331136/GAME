<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲倉庫</title>
    <style>
        :root { 
            --sidebar-width: 260px; 
            --dark-bg: #1e1f20; 
            --item-hover: #333537; 
            --accent: #8ab4f8; 
            --light-text: #e3e3e3; 
            --danger: #ff5252;
        }
        body { font-family: '微軟正黑體', sans-serif; margin: 0; display: flex; height: 100vh; background: #131314; color: var(--light-text); overflow: hidden; }

        /* --- 側邊選單 --- */
        #sidebar { 
            width: var(--sidebar-width); background: var(--dark-bg); transition: 0.3s; 
            border-right: 1px solid #444; z-index: 100; flex-shrink: 0;
            overflow-y: auto; 
        }
        #sidebar.collapsed { width: 0; border: none; visibility: hidden; opacity: 0; }
        .sidebar-content { padding: 20px; width: var(--sidebar-width); box-sizing: border-box; }
        .menu-category { font-size: 0.8rem; color: #9aa0a6; margin: 20px 0 10px 10px; text-transform: uppercase; white-space: nowrap; }
        .menu-item { padding: 12px 15px; margin: 4px 0; border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; white-space: nowrap; }
        .menu-item:hover { background: var(--item-hover); }
        .menu-item.active { background: #394457; color: var(--accent); }

        /* --- 主內容 --- */
        #main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        #header { background: #131314; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        #menu-toggle { background: none; border: none; color: white; font-size: 24px; cursor: pointer; border-radius: 50%; width: 45px; height: 45px; flex-shrink: 0; }
        #menu-toggle:hover { background: var(--item-hover); }
        .score-box { display: flex; gap: 10px; }
        .score-item { font-size: 0.9rem; background: #282a2d; padding: 8px 15px; border-radius: 10px; border: 1px solid #444; min-width: 80px; text-align: center; }

        /* --- 遊戲顯示區域 --- */
        #game-display { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; overflow-y: auto; }
        
        /* 2048 樣式 */
        #game-2048 { display: none; background: #bbada0; width: 320px; height: 320px; padding: 10px; border-radius: 6px; position: relative; }
        #grid-base { position: relative; width: 100%; height: 100%; }
        .cell { width: 70px; height: 70px; background: rgba(238, 228, 218, 0.35); border-radius: 3px; position: absolute; }
        .tile { width: 70px; height: 70px; border-radius: 3px; position: absolute; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: bold; color: #776e65; transition: all 0.12s ease-in-out; z-index: 10; }

        /* Canvas 類遊戲共通樣式 */
        #game-snake, #game-magnet, #game-defense, #game-breakout, #game-laser { display: none; flex-direction: column; align-items: center; }
        canvas { border: 5px solid #333; background-color: #000; border-radius: 5px; max-width: 100%; cursor: crosshair; }

        /* 一筆畫地牢樣式 */
        #game-dungeon { display: none; flex-direction: column; align-items: center; }
        #dungeon-board { 
            display: grid; grid-template-columns: repeat(5, 60px); grid-template-rows: repeat(5, 60px); 
            gap: 8px; background: #282a2d; padding: 15px; border-radius: 12px; border: 2px solid #444;
        }
        .dg-cell { 
            width: 60px; height: 60px; background: #3c4043; border-radius: 8px;
            display: flex; justify-content: center; align-items: center; font-size: 1.8rem;
            cursor: pointer; transition: 0.2s; position: relative; box-sizing: border-box;
        }
        .dg-cell:hover { background: #4f5357; }
        .dg-cell.visited { background: #394457; border: 2px solid var(--accent); }
        .dg-cell.current { background: var(--accent); transform: scale(1.08); z-index: 2; box-shadow: 0 0 15px var(--accent); }
        .dg-cell.exit { background: #ffd740; box-shadow: 0 0 10px #ffd740; }

        /* 彈窗樣式 */
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #2c2c2c; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--accent); box-shadow: 0 0 30px rgba(138, 180, 248, 0.3); }
        .modal-btn { background: var(--accent); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; margin: 10px; transition: 0.2s; }
        .modal-btn:hover { opacity: 0.8; transform: scale(1.05); }
        .modal-btn.secondary { background: #555; color: white; }

        /* 2048 色彩數值 */
        .n2 { background: #eee4da; } .n4 { background: #ede0c8; } .n8 { background: #f2b179; color: white; }
        .n16 { background: #f59563; color: white; } .n32 { background: #f67c5f; color: white; } .n64 { background: #f65e3b; color: white; }
        .n128 { background: #edcf72; color: white; font-size: 22px; } .n256 { background: #edcc61; color: white; font-size: 22px; }
        .n512 { background: #edc850; color: white; font-size: 22px; } .n1024 { background: #edc53f; color: white; font-size: 18px; }
        .n2048 { background: #edc22e; color: white; font-size: 18px; box-shadow: 0 0 15px 5px rgba(243, 215, 116, 0.4); }
    </style>
</head>
<body>

<div id="custom-modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-msg"></p>
        <div id="modal-actions"></div>
    </div>
</div>

<nav id="sidebar">
    <div class="sidebar-content">
        <h2 style="color: var(--accent);">遊戲倉庫</h2>
        <div class="menu-category">益智解謎</div>
        <div class="menu-item" id="btn-2048" onclick="switchGame('2048')"><span>🎮</span> 2048</div>
        <div class="menu-item" id="btn-snake" onclick="switchGame('snake')"><span>🐍</span> 貪食蛇</div>
        <div class="menu-item" id="btn-dungeon" onclick="switchGame('dungeon')"><span>🗝️</span> 一筆畫地牢</div>
        <div class="menu-item" id="btn-laser" onclick="switchGame('laser')"><span>⚡</span> 雷射導引</div>
        <div class="menu-category">動作反饋</div>
        <div class="menu-item" id="btn-breakout" onclick="switchGame('breakout')"><span>🎾</span> 極簡打磚塊</div>
        <div class="menu-item" id="btn-magnet" onclick="switchGame('magnet')"><span>🧲</span> 極地磁鐵</div>
        <div class="menu-item" id="btn-defense" onclick="switchGame('defense')"><span>🛡️</span> 色塊防線</div>
        <div class="menu-category">管理</div>
        <div class="menu-item" onclick="localStorage.clear(); location.reload();"><span>🗑️</span> 清除紀錄</div>
    </div>
</nav>

<div id="main">
    <header id="header">
        <div class="nav-left">
            <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div id="current-title" style="font-size: 1.2rem; font-weight: bold;">首頁</div>
        </div>
        <div class="score-box">
            <div class="score-item">分數: <span id="score">0</span></div>
            <div class="score-item" style="color: var(--accent);">最高: <span id="best">0</span></div>
        </div>
    </header>

    <div id="game-display">
        <h3 id="welcome-msg">← 點擊左側選單開始遊戲</h3>
        
        <div id="game-2048"><div id="grid-base"></div></div>
        <div id="game-snake"><canvas id="snakeCanvas" width="400" height="400"></canvas></div>
        <div id="game-magnet"><canvas id="magnetCanvas" width="400" height="500"></canvas></div>
        <div id="game-defense">
            <canvas id="defenseCanvas" width="400" height="400"></canvas>
            <p style="color: #888; margin-top: 15px;">使用 A / D 或 方向鍵旋轉方塊</p>
        </div>
        <div id="game-dungeon">
            <div id="dungeon-board"></div>
            <div id="dungeon-stats" style="margin-top: 15px; text-align: center;">
                <div style="margin-bottom: 5px;">生命值: <span id="dg-hp">100</span> / 100</div>
                <progress id="hp-bar" value="100" max="100" style="width: 250px; height: 15px; accent-color: #ff5252;"></progress>
                <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: center;">
                    <button class="modal-btn secondary" onclick="undoDungeon()" style="padding: 5px 15px; font-size: 0.8rem;">⬅️ 上一步</button>
                    <button class="modal-btn secondary" onclick="initDungeon()" style="padding: 5px 15px; font-size: 0.8rem;">🔄 重置</button>
                </div>
            </div>
        </div>
        <div id="game-breakout"><canvas id="breakoutCanvas" width="400" height="500"></canvas></div>
        <div id="game-laser">
            <canvas id="laserCanvas" width="400" height="400"></canvas>
            <p style="color: #888; margin-top: 15px;">點擊格子放置/旋轉鏡子，讓光束擊中黃色目標</p>
        </div>
    </div>
</div>

<script>
    let currentGame = "", gameActive = false;
    let mainLoop; 
    let hasWon2048 = false;

    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function switchGame(game) {
        document.getElementById('welcome-msg').style.display = 'none';
        ['game-2048', 'game-snake', 'game-magnet', 'game-defense', 'game-dungeon', 'game-breakout', 'game-laser'].forEach(id => {
            document.getElementById(id).style.display = 'none';
        });
        
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        const btn = document.getElementById('btn-' + game);
        if(btn) btn.classList.add('active');
        
        if(window.snakeInterval) clearInterval(window.snakeInterval);
        cancelAnimationFrame(mainLoop);
        closeModal();

        currentGame = game;
        gameActive = true;
        document.getElementById('score').innerText = "0";

        if(game === '2048') {
            document.getElementById('current-title').innerText = "2048";
            document.getElementById('game-2048').style.display = 'block'; 
            hasWon2048 = false; init2048();
        } else if(game === 'snake') {
            document.getElementById('current-title').innerText = "貪食蛇";
            document.getElementById('game-snake').style.display = 'flex'; initSnake();
        } else if(game === 'magnet') {
            document.getElementById('current-title').innerText = "極地磁鐵";
            document.getElementById('game-magnet').style.display = 'flex'; initMagnet();
        } else if(game === 'defense') {
            document.getElementById('current-title').innerText = "色塊防線";
            document.getElementById('game-defense').style.display = 'flex'; initDefense();
        } else if(game === 'dungeon') {
            document.getElementById('current-title').innerText = "一筆畫地牢";
            document.getElementById('game-dungeon').style.display = 'flex'; initDungeon();
        } else if(game === 'breakout') {
            document.getElementById('current-title').innerText = "極簡打磚塊";
            document.getElementById('game-breakout').style.display = 'flex'; initBreakout();
        } else if(game === 'laser') {
            document.getElementById('current-title').innerText = "雷射導引";
            document.getElementById('game-laser').style.display = 'flex'; initLaser();
        }
    }

    function openModal(title, msg, actions = []) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        const container = document.getElementById('modal-actions');
        container.innerHTML = '';
        if (actions.length === 0) actions = [{ text: "再次挑戰", callback: restartCurrentGame, class: "" }];
        actions.forEach(act => {
            const btn = document.createElement('button');
            btn.className = 'modal-btn ' + (act.class || '');
            btn.innerText = act.text;
            btn.onclick = act.callback;
            container.appendChild(btn);
        });
        document.getElementById('custom-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }

    function restartCurrentGame() {
        closeModal();
        switchGame(currentGame);
    }

    // --- 2048 核心 ---
    let b2048 = [], s2048 = 0;
    function init2048() {
        b2048 = Array(16).fill(0); s2048 = 0;
        document.getElementById('best').innerText = localStorage.getItem('2048_best') || 0;
        const grid = document.getElementById('grid-base'); grid.innerHTML = '';
        for (let i = 0; i < 16; i++) {
            let c = document.createElement('div'); c.className = 'cell';
            c.style.left = (i % 4) * 78 + 'px'; c.style.top = Math.floor(i / 4) * 78 + 'px';
            grid.appendChild(c);
        }
        spawn2048(); spawn2048();
    }
    function spawn2048() {
        let empty = b2048.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
        if(empty.length) b2048[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
        render2048();
    }
    function render2048() {
        const grid = document.getElementById('grid-base');
        grid.querySelectorAll('.tile').forEach(t => t.remove());
        b2048.forEach((val, i) => {
            if(val > 0) {
                let t = document.createElement('div');
                t.className = `tile n${val > 2048 ? 2048 : val}`;
                t.innerText = val;
                t.style.left = (i % 4) * 78 + 'px'; t.style.top = Math.floor(i / 4) * 78 + 'px';
                grid.appendChild(t);
            }
        });
        document.getElementById('score').innerText = s2048;
        let best = localStorage.getItem('2048_best') || 0;
        if(s2048 > parseInt(best)) { localStorage.setItem('2048_best', s2048); document.getElementById('best').innerText = s2048; }
        if (!hasWon2048 && b2048.includes(2048)) {
            hasWon2048 = true;
            openModal("🏆 傳奇誕生！", "成功合成了 2048 方塊！", [{ text: "繼續", callback: closeModal, class: "secondary" }]);
        }
        check2048GameOver();
    }
    function move2048(dir) {
        if(currentGame !== "2048" || !gameActive) return;
        let old = [...b2048];
        for (let i = 0; i < 4; i++) {
            let row = [], indices = [];
            for (let j = 0; j < 4; j++) {
                let idx = (dir==='left')? i*4+j : (dir==='right')? i*4+(3-j) : (dir==='up')? j*4+i : (3-j)*4+i;
                indices.push(idx); row.push(b2048[idx]);
            }
            let arr = row.filter(v => v !== 0);
            for (let j = 0; j < arr.length - 1; j++) { if (arr[j] === arr[j+1]) { arr[j] *= 2; s2048 += arr[j]; arr.splice(j+1, 1); } }
            while (arr.length < 4) arr.push(0);
            indices.forEach((idx, j) => b2048[idx] = arr[j]);
        }
        if (JSON.stringify(old) !== JSON.stringify(b2048)) spawn2048();
    }
    function check2048GameOver() {
        if (b2048.includes(0)) return;
        for (let i = 0; i < 16; i++) {
            if (i % 4 < 3 && b2048[i] === b2048[i+1]) return;
            if (i < 12 && b2048[i] === b2048[i+4]) return;
        }
        gameActive = false; openModal("遊戲結束", "得分：" + s2048);
    }

    // --- 貪食蛇 ---
    let snake, food, dx, dy, sSnake;
    function initSnake() {
        snake = [{x: 200, y: 200}, {x: 190, y: 200}]; dx = 10; dy = 0; sSnake = 0;
        document.getElementById('best').innerText = localStorage.getItem('snake_best') || 0;
        createFood();
        window.snakeInterval = setInterval(drawSnake, 100);
    }
    function drawSnake() {
        let ctx = document.getElementById('snakeCanvas').getContext('2d');
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || snake.some(p => p.x === head.x && p.y === head.y)) {
            clearInterval(window.snakeInterval); openModal("遊戲結束", "得分：" + sSnake); return;
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            sSnake += 10; document.getElementById('score').innerText = sSnake;
            let best = localStorage.getItem('snake_best') || 0;
            if(sSnake > parseInt(best)) localStorage.setItem('snake_best', sSnake);
            createFood();
        } else snake.pop();
        ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
        ctx.fillStyle = "#ff5252"; ctx.fillRect(food.x, food.y, 10, 10);
        ctx.fillStyle = "#8ab4f8"; snake.forEach(p => ctx.fillRect(p.x, p.y, 10, 10));
    }
    function createFood() { food = { x: Math.floor(Math.random()*39)*10, y: Math.floor(Math.random()*39)*10 }; }

    // --- 極簡打磚塊 ---
    let bBall, bPaddle, bBricks, bParticles, bScore;
    function initBreakout() {
        bBall = { x: 200, y: 400, dx: 3.5, dy: -3.5, r: 8 };
        bPaddle = { x: 160, w: 80, h: 10 };
        bBricks = []; bParticles = []; bScore = 0;
        document.getElementById('best').innerText = localStorage.getItem('breakout_best') || 0;
        for(let r=0; r<4; r++) {
            for(let c=0; c<6; c++) {
                bBricks.push({ x: c*65+10, y: r*25+50, w: 55, h: 15, active: true });
            }
        }
        breakoutLoop();
    }
    function breakoutLoop() {
        if(currentGame !== 'breakout') return;
        const canvas = document.getElementById('breakoutCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 500);

        bBall.x += bBall.dx; bBall.y += bBall.dy;
        if(bBall.x + bBall.r > 400 || bBall.x - bBall.r < 0) bBall.dx *= -1;
        if(bBall.y - bBall.r < 0) bBall.dy *= -1;
        if(bBall.y + bBall.r > 480 && bBall.x > bPaddle.x && bBall.x < bPaddle.x + bPaddle.w) {
            bBall.dy = -Math.abs(bBall.dy) * 1.02;
            bBall.dx += (bBall.x - (bPaddle.x + bPaddle.w/2)) / 8;
        }
        if(bBall.y > 500) { openModal("挑戰失敗", "得分：" + bScore); return; }

        let activeCount = 0;
        bBricks.forEach(b => {
            if(b.active) {
                activeCount++;
                if(bBall.x > b.x && bBall.x < b.x + b.w && bBall.y - bBall.r < b.y + b.h && bBall.y + bBall.r > b.y) {
                    b.active = false; bBall.dy *= -1; bScore += 20;
                    document.getElementById('score').innerText = bScore;
                    for(let i=0; i<6; i++) bParticles.push({x: b.x+b.w/2, y: b.y+b.h/2, dx: (Math.random()-0.5)*6, dy: (Math.random()-0.5)*6, life: 25});
                }
                ctx.fillStyle = "#8ab4f8"; ctx.fillRect(b.x, b.y, b.w, b.h);
            }
        });
        if(activeCount === 0) { openModal("完美清空！", "得分：" + bScore); return; }

        bParticles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.life--;
            ctx.fillStyle = `rgba(138, 180, 248, ${p.life/25})`;
            ctx.fillRect(p.x, p.y, 3, 3);
            if(p.life <= 0) bParticles.splice(i, 1);
        });

        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(bBall.x, bBall.y, bBall.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "var(--accent)"; ctx.fillRect(bPaddle.x, 480, bPaddle.w, bPaddle.h);
        
        let best = localStorage.getItem('breakout_best') || 0;
        if(bScore > parseInt(best)) { localStorage.setItem('breakout_best', bScore); }

        mainLoop = requestAnimationFrame(breakoutLoop);
    }

    // --- 雷射導引 ---
    let lMirrors, lGoal, lEmitter;
    function initLaser() {
        lEmitter = { x: 0, y: 2 }; 
        lGoal = { x: 4, y: 2 }; // 固定目標在 (4, 2)
        lMirrors = Array(25).fill(null);
        document.getElementById('best').innerText = "-";
        drawLaserGame();
        
        const canvas = document.getElementById('laserCanvas');
        canvas.onclick = (e) => {
            if(currentGame !== 'laser') return;
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (canvas.clientWidth / 5));
            const y = Math.floor((e.clientY - rect.top) / (canvas.clientHeight / 5));
            const idx = y * 5 + x;
            
            // 點擊邏輯：空 -> 45度 -> 135度 -> 空
            if(lMirrors[idx] === null) lMirrors[idx] = 45;
            else if(lMirrors[idx] === 45) lMirrors[idx] = 135;
            else lMirrors[idx] = null;
            
            drawLaserGame();
        };
    }

    function drawLaserGame() {
        const canvas = document.getElementById('laserCanvas');
        const ctx = canvas.getContext('2d');
        const sz = 80;
        
        // 1. 背景與網格
        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,400,400);
        ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
        for(let i=0; i<=5; i++) { 
            ctx.beginPath(); ctx.moveTo(i*sz, 0); ctx.lineTo(i*sz, 400); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i*sz); ctx.lineTo(400, i*sz); ctx.stroke();
        }

        // 2. 繪製「黃色」目標 (修正看不到問題)
        ctx.save();
        ctx.fillStyle = "#ffd700"; // 金黃色
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ffd700";
        ctx.fillRect(lGoal.x * sz + 20, lGoal.y * sz + 20, 40, 40);
        ctx.restore();

        // 3. 繪製鏡子
        lMirrors.forEach((m, i) => {
            if(m) {
                const x = (i % 5) * sz, y = Math.floor(i / 5) * sz;
                ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.beginPath();
                if(m === 45) { ctx.moveTo(x+15, y+sz-15); ctx.lineTo(x+sz-15, y+15); }
                else { ctx.moveTo(x+15, y+15); ctx.lineTo(x+sz-15, y+sz-15); }
                ctx.stroke();
            }
        });

        // 4. 繪製雷射光束
        ctx.beginPath(); 
        ctx.strokeStyle = "#ff5252"; 
        ctx.lineWidth = 4;
        ctx.shadowBlur = 10; 
        ctx.shadowColor = "#ff5252"; 
        ctx.moveTo(0, lEmitter.y * sz + sz/2);
        
        traceLaser(0, lEmitter.y * sz + sz/2, 1, 0, 0);
        
        ctx.stroke(); 
        ctx.shadowBlur = 0;
    }

    function traceLaser(x, y, dx, dy, step) {
        if(step > 15) return; 
        const sz = 80;
        let nx = x + dx * 400, ny = y + dy * 400;
        let hitMirror = false;

        for(let i=0; i<25; i++) {
            if(lMirrors[i]) {
                const mx = (i % 5) * sz, my = Math.floor(i / 5) * sz;
                const cx = mx + sz/2, cy = my + sz/2;
                
                if(dx !== 0 && Math.abs(y-cy) < 5 && ((dx>0 && x<cx)||(dx<0 && x>cx))) {
                    nx = cx; ny = cy; hitMirror = true;
                    const ctx = document.getElementById('laserCanvas').getContext('2d');
                    ctx.lineTo(nx, ny);
                    let ndx = (lMirrors[i] === 45) ? -dy : dy;
                    let ndy = (lMirrors[i] === 45) ? -dx : dx;
                    traceLaser(nx, ny, ndx, ndy, step + 1); 
                    break;
                } else if(dy !== 0 && Math.abs(x-cx) < 5 && ((dy>0 && y<cy)||(dy<0 && y>cy))) {
                    nx = cx; ny = cy; hitMirror = true;
                    const ctx = document.getElementById('laserCanvas').getContext('2d');
                    ctx.lineTo(nx, ny);
                    let ndx = (lMirrors[i] === 45) ? -dy : dy;
                    let ndy = (lMirrors[i] === 45) ? -dx : dx;
                    traceLaser(nx, ny, ndx, ndy, step + 1); 
                    break;
                }
            }
        }

        if(!hitMirror) {
            const ctx = document.getElementById('laserCanvas').getContext('2d');
            ctx.lineTo(nx, ny);
            // 判定是否碰到黃色目標
            if(Math.abs(nx-(lGoal.x*sz+sz/2)) < 30 && Math.abs(ny-(lGoal.y*sz+sz/2)) < 30) {
                if(gameActive) { 
                    gameActive = false; 
                    setTimeout(() => openModal("精準命中！", "光束成功抵達黃色目標"), 100); 
                }
            }
        }
    }

    // --- 極地磁鐵 ---
    let mMagnet, mObstacles, mDirection, mScore;
    function initMagnet() {
        mMagnet = { x: 50, y: 250, radius: 15, velocity: 0 };
        mDirection = 1; mObstacles = []; mScore = 0;
        document.getElementById('best').innerText = localStorage.getItem('magnet_best') || 0;
        magnetLoop();
    }
    function magnetLoop() {
        if(currentGame !== 'magnet') return;
        let canvas = document.getElementById('magnetCanvas'); let ctx = canvas.getContext('2d');
        mMagnet.velocity += 0.22 * mDirection; mMagnet.velocity *= 0.98; mMagnet.y += mMagnet.velocity;
        if (mMagnet.y < 0 || mMagnet.y > canvas.height) { openModal("磁場潰散", "得分：" + mScore); return; }
        if (mObstacles.length === 0 || mObstacles[mObstacles.length-1].x < 180) {
            let gap = 170, rY = Math.random() * (canvas.height - 270) + 50;
            mObstacles.push({ x: 400, top: rY, bottom: rY + gap, passed: false });
        }
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 500);
        ctx.fillStyle = "#00f2ff";
        mObstacles.forEach((obs, i) => {
            obs.x -= 3.5;
            ctx.fillRect(obs.x, 0, 50, obs.top); ctx.fillRect(obs.x, obs.bottom, 50, 500);
            if (mMagnet.x + 10 > obs.x && mMagnet.x - 10 < obs.x + 50) {
                if (mMagnet.y - 10 < obs.top || mMagnet.y + 10 > obs.bottom) { openModal("任務失敗", "得分：" + mScore); return; }
            }
            if (!obs.passed && obs.x < mMagnet.x) { mScore++; obs.passed = true; document.getElementById('score').innerText = mScore; }
            if (obs.x < -60) mObstacles.splice(i, 1);
        });
        ctx.beginPath(); ctx.arc(mMagnet.x, mMagnet.y, 15, 0, Math.PI*2);
        ctx.fillStyle = mDirection > 0 ? "#ff4d4d" : "#4d79ff"; ctx.fill();
        mainLoop = requestAnimationFrame(magnetLoop);
    }

    // --- 色塊防線 ---
    let dRot, dEnemies, dHealth, dDefScore;
    const D_COLORS = ['#ff4d4d', '#4d79ff', '#ffeb3b', '#4caf50'];
    function initDefense() {
        dRot = 0; dEnemies = []; dHealth = 3; dDefScore = 0;
        document.getElementById('best').innerText = localStorage.getItem('defense_best') || 0;
        defenseLoop();
    }
    function defenseLoop() {
        if(currentGame !== 'defense') return;
        const canvas = document.getElementById('defenseCanvas'); const ctx = canvas.getContext('2d');
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
        if (Math.random() < 0.02) {
            let angle = Math.random() * Math.PI * 2;
            dEnemies.push({ x: 200 + Math.cos(angle)*200, y: 200 + Math.sin(angle)*200, color: Math.floor(Math.random()*4) });
        }
        dEnemies.forEach((en, i) => {
            let dx = 200-en.x, dy = 200-en.y, dist = Math.sqrt(dx*dx+dy*dy);
            en.x += dx/dist * 2.5; en.y += dy/dist * 2.5;
            ctx.fillStyle = D_COLORS[en.color]; ctx.beginPath(); ctx.arc(en.x, en.y, 8, 0, 7); ctx.fill();
            if (dist < 60) {
                let hitAngle = (Math.atan2(en.y-200, en.x-200)*180/Math.PI + 360 + 45 - dRot) % 360;
                let side = Math.floor(hitAngle/90);
                if ([1,2,3,0][side] === en.color) { dDefScore += 10; document.getElementById('score').innerText = dDefScore; }
                else { dHealth--; if(dHealth <=0) openModal("防線潰散", "得分："+dDefScore); }
                dEnemies.splice(i, 1);
            }
        });
        ctx.save(); ctx.translate(200, 200); ctx.rotate(dRot * Math.PI/180);
        for(let i=0; i<4; i++) { ctx.strokeStyle = D_COLORS[i]; ctx.lineWidth=10; ctx.beginPath(); ctx.moveTo(-50, -50); ctx.lineTo(50, -50); ctx.stroke(); ctx.rotate(Math.PI/2); }
        ctx.restore();
        ctx.fillStyle="white"; ctx.fillText("❤️".repeat(dHealth), 20, 30);
        mainLoop = requestAnimationFrame(defenseLoop);
    }

    // --- 一筆畫地牢 ---
    let dgMap, dgPath, dgHP;
    const DG_LEVEL = [0,1,0,0,0, 0,2,1,1,0, 0,0,0,2,0, 1,1,0,1,1, 2,0,0,0,3];
    function initDungeon() {
        dgMap = [...DG_LEVEL]; dgPath = [0]; dgHP = 100;
        document.getElementById('best').innerText = localStorage.getItem('dungeon_best') || 0;
        updateDungeonUI();
    }
    function updateDungeonUI() {
        const board = document.getElementById('dungeon-board'); board.innerHTML = '';
        dgMap.forEach((type, i) => {
            const cell = document.createElement('div'); cell.className = 'dg-cell';
            const isVisited = dgPath.includes(i), isCurrent = dgPath[dgPath.length-1] === i;
            if (isVisited) cell.classList.add('visited');
            if (isCurrent) cell.classList.add('current');
            if (type === 3) cell.classList.add('exit');
            if (isCurrent) cell.innerHTML = '👤';
            else if (type === 1 && !isVisited) cell.innerHTML = '👾';
            else if (type === 2 && !isVisited) cell.innerHTML = '🧪';
            else if (type === 3) cell.innerHTML = '🏁';
            cell.onclick = () => moveDungeon(i);
            board.appendChild(cell);
        });
        document.getElementById('dg-hp').innerText = dgHP;
        document.getElementById('hp-bar').value = dgHP;
        document.getElementById('score').innerText = dgPath.length;
    }
    function moveDungeon(target) {
        if (!gameActive) return;
        const cur = dgPath[dgPath.length-1];
        if (dgPath.length > 1 && target === dgPath[dgPath.length-2]) { undoDungeon(); return; }
        const r1 = Math.floor(cur/5), c1 = cur%5, r2 = Math.floor(target/5), c2 = target%5;
        if (Math.abs(r1-r2)+Math.abs(c1-c2) === 1 && !dgPath.includes(target)) {
            if (dgMap[target] === 1) dgHP -= 25;
            if (dgMap[target] === 2) dgHP = Math.min(100, dgHP + 20);
            dgPath.push(target);
            if (dgHP <= 0) openModal("冒險失敗", "生命值耗盡");
            else if (dgMap[target] === 3) openModal("成功逃脫", "探索率：" + Math.round(dgPath.length/25*100) + "%");
            updateDungeonUI();
        }
    }
    function undoDungeon() { if (dgPath.length > 1) { dgPath.pop(); updateDungeonUI(); } }

    // --- 全域事件 ---
    window.addEventListener('keydown', e => {
        const k = e.code;
        if (currentGame === "2048") {
            if(k.includes('Left') || k==='KeyA') move2048('left');
            if(k.includes('Right') || k==='KeyD') move2048('right');
            if(k.includes('Up') || k==='KeyW') move2048('up');
            if(k.includes('Down') || k==='KeyS') move2048('down');
        } else if (currentGame === "snake") {
            if((k.includes('Up')||k==='KeyW') && dy===0) {dx=0; dy=-10;}
            if((k.includes('Down')||k==='KeyS') && dy===0) {dx=0; dy=10;}
            if((k.includes('Left')||k==='KeyA') && dx===0) {dx=-10; dy=0;}
            if((k.includes('Right')||k==='KeyD') && dx===0) {dx=10; dy=0;}
        } else if (currentGame === "magnet" && (k==='Space' || k.includes('Up'))) {
            mDirection *= -1;
        } else if (currentGame === "defense") {
            if(k.includes('Left') || k==='KeyA') dRot -= 90;
            if(k.includes('Right') || k==='KeyD') dRot += 90;
        }
    });

    // 打磚塊滑鼠控制
    window.addEventListener('mousemove', e => {
        if(currentGame === 'breakout') {
            const rect = document.getElementById('breakoutCanvas').getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            bPaddle.x = Math.max(0, Math.min(400 - bPaddle.w, mouseX - bPaddle.w/2));
        }
    });

    document.getElementById('magnetCanvas').onmousedown = () => { if(currentGame==='magnet') mDirection*=-1; };
</script>
